{% load static %}
{% load i18n %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Artuarium</title>
    <link rel="icon" type="image/png" href="{% static 'assets/img/logo_pestana.png' %}">
    <link rel="shortcut icon" href="{% static 'assets/img/logo_pestana.png' %}">
    <link rel="apple-touch-icon" href="{% static 'assets/img/logo_pestana.png' %}">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">

    <style>
        body {
            background: #344E41;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: "Inter", "Segoe UI", sans-serif;
        }

        .login-card {
            width: 360px;
            background: #fff;
            {% comment %} border-radius: 14px; {% endcomment %}
            padding: 34px 26px;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .logo-login {
            width: 140px;
            margin-bottom: 20px;
        }

        input[type="text"], input[type="password"] {
            width: 80%;
            height: 40px;
            {% comment %} border-radius: 8px; {% endcomment %}
            border: 1px solid #d1d9e0;
            padding: 0 12px;
            font-size: 0.9rem;
            color: #1a1a1a;
            outline: none;
            transition: all 0.2s ease-in-out;
        }

        input::placeholder {
            color: #9aa3ac;
        }

        input:focus {
            border-color: #344E41;
            box-shadow: 0 0 4px #344E41 !important;  /* ese es tu verde con opacidad */
        }

        .enter-btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            border: 1px solid #344E41;
            color: #344E41;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-size: 0.8rem;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            background: transparent;
            cursor: pointer;
            margin-top: 1rem !important;
        }

        .enter-btn:hover {
            background-color: #344E41;
            color: #fff;
            }

        .alert-custom {
            background: #dc3545;
            border-radius: 6px;
            font-size: 0.8rem;
            padding: 8px;
            margin-bottom: 14px;
            color: #fff;
        }
    </style>
</head>

    <body> 
        <div class="login-card">
            <img src="{% static 'assets/img/Logotipo_Arturium_4.svg' %}" alt="Artuarium" class="logo-login">

            {% if form.errors %}
            <div class="alert-custom">
                {% translate "Invalid username " %}
            </div>
            {% endif %}

            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                <input type="text" name="username" placeholder="{% translate 'Username' %}" required><br><br>
                <input type="password" name="password" placeholder="{% translate 'Password' %}" required><br>
                <button class="enter-btn mt-5" type="submit">
                    {% translate "Login" %}
                </button>
            </form>
        </div>
    </body>
</html>
